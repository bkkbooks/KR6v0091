body:
  text: 方廣錩佛教從印度傳到中國與中國傳統文化相結合形成中國佛教中國佛教有許多不同於印度佛教的特點而中國佛教大藏經的出現也是中國佛教不同於印度佛教的特點之一與古印度諸國分立的政治局面相適應印度佛教從部派分裂開始就再也沒有統一過印度人傾向於認為無數相互對立的集團與派別各種異質東西的同時並存是一種正常的現象部派佛教時期的印度僧人說一個金手杖雖然斷為十八截但每截都是真金的由此論證了當時分裂的諸多部派都屬於佛教正統都是合理的存在出於這種思想方式他們自然無意於從事統一佛藏的工作因此印度佛教在理論上雖有三藏菩薩藏的提法但在實際上大乘小乘各個派別各自傳承自己的典籍不存在標準的規範化的佛藏呈現出百花齊放之勢中國的情況則不相同從歷史上看從古到今中國基本處於大一統的政治格局即使國家暫短分裂有關國家或自詡正統以統一為己任或奉別國正朔自居於藩屬因此在中國人看來統一是正常的分裂是不正常的與此相應在意識文化領域中國人總是力圖會融各種矛盾因素致力於建立一個圓融和諧的體系南北朝時期中國僧人的判教唐代中國僧人玄奘到印度後撰寫會宗論都是中國人這種思想方法的反映中國人在這種思想方法的指導下從事佛教文獻的整理便促成了統一的網羅所有典籍的示範性的大藏經的出現此外中國有著悠久而深厚的文化傳統漢民族向來既重武功又重文治始終十分重視對古代文化的繼承與古代典籍的整理中國歷代王朝也都把搜求書籍豫以整理編目當作弘揚文治的一件大事漢民族的文化氣魄也更加恢弘胸懷更加博大形成吸收消化各種外來文化會融各種不同觀點的良好條件上述種種鑄成我國民族文化的深層意識漢文大藏經的形成也是這種民族文化意識的反映中國的佛教大藏經醞釀於漢魏兩晉形成於南北朝其結構體系定型於隋唐以往有一種觀點認為自從開元十八年智升撰成開元釋教録以下簡稱開元録後其入藏録所定的部卷帙便成為人們修造大藏經的規範其實開元録撰成後祗是當時流傳的諸種私家經録之一還沒有取得一統天下的地位即使那些參考開元入藏録而修造的大藏經也不完全遵循它的規範而是按照當時當地的具體情況豫以斟酌損益直到會昌廢佛以後各地的大藏經才逐步統一到開元入藏録的形態上關於這個問題拙作八十世紀佛教大藏經史已有論述本文則擬以慧琳音義為例進一步探討這個問題慧琳音義一百卷唐釋慧琳撰慧琳為唐長安西明寺僧俗姓裴疏勒國人幼習儒學出家後師事不空三藏對於印度聲明中國訓詁等都有深入的研究慧琳以前佛教音義已經出現但未能涵蓋全部大藏經有的且有訛誤於是慧琳參考各家音義依據韻英考聲切韻等以釋音根據說文字林玉篇字統古今正字文字典說開元文字音義等以釋義並兼采一般經史百家學說以佛意為標準詳加考定撰成一切經音義按照宋高僧傳卷五慧琳傳的說法該音義是唐德宗貞元四年開始編纂至唐憲宗元和五年止中經二十三年方才完成後十年即元和十五年慧琳卒於西明寺享年歲目前流傳的諸種工具書大體採擷此說但現存大正藏本慧琳音義底本為高麗藏本亦即目前所傳該音義最古老的傳本所附景審一切經音義序稱以建中末年創制至元和二祀方就凡一百軸則該音義的編纂年代為建中四年至元和二年共計年又該景審序對慧琳逝世的年代與宋高僧傳的記載也不同稱慧琳於元和十二年二月三十日絶筆於西明寺陳垣先生注意到上述兩種說法不同但認為二說尚無大異故將兩說並存未作取捨陳士強先生則認為景審序比宋高僧傳早一百多年以理相推要更可靠些查景審在序末寫道審以頗好文字擇善從之許為不請之師自愧未成之器因啓其卷乃告厥功謬以微才敘之云爾可見景審不僅與慧琳生活在同時代同地區並曾執弟子禮請益正因為曾經有這種身份所以在慧琳逝世後為慧琳音義作序則景審記敘的可靠性毋庸懷疑又慧琳音義前還有開成五年九月十日顧齊之撰新收一切藏經音義序其中也稱慧琳建中末乃著經音義一百卷從另一方面證實景審記敘的可靠而宋高僧傳的作者贊寧不但年代要遲一百多年本人也沒有見到過慧琳音義他的記敘祗能是傳聞之辭又宋高僧傳稱慧琳是唐京師西明寺慧琳即主張慧琳的隸寺為西明寺而景審序則稱有大興善寺慧琳法師者元和十二年二月三十日絶筆於西明寺焉則慧琳的隸寺應為大興善寺慧琳的隸寺是大興善寺或與他曾從不空修習密教有關不過後來慧琳為編纂一切經音義而到西明寺生活並最終在西明寺逝世隸屬於某寺而在另一寺院活動這種情況在唐代僧人中較為多見所以慧琳後來雖在西明寺活動並逝世卻並不改變他的隸寺是大興善寺這一事實當然唐代僧人也有改變隸寺的情況但景審的序言既然寫作於慧琳逝世以後且序中仍稱慧琳為大興善寺慧琳法師則直到慧琳逝世他的隸寺並沒有變化由此宋高僧傳的記載是錯誤的隸屬於大興善寺的慧琳何以要到西明寺去編纂一切經音義這自然與當時西明寺在佛教界的地位有關西明寺是唐代首都長安的主要寺院之一位於右街與同在右街的大莊嚴寺以及位于左街的慈恩寺薦福寺齊名在這些寺院中西明寺收藏的佛藏特別著名以致被稱為西明藏唐代著名佛教目録學家道宣就隸屬於西明寺西明寺的藏經被視為長安藏經的代表在慧琳編纂一切經音義的時代尤其如此這是因為著名的西明寺僧人圓照剛剛完成了他的巨著貞元新定釋教目録以下簡稱貞元録釋圓照宋高僧傳卷十五有傳是當時著名的律宗僧人他繼承律宗僧人編纂佛教目録的傳統首先編纂了續開元釋教録以下簡稱續開元録三卷將智升開元録編成後新出的佛典逐一著録其後因唐德宗的敕命在開元録的基礎上加上其後新出的經典等於貞元十六年完成了貞元録貞元録的入藏録收經部卷分為帙比開元入藏録多收部卷帙貞元録是當時的官定經録它所編定的藏經是當時的皇家官藏具有一定的權威與示範作用可以想見慧琳既然要為一切經亦即大藏經編纂音義自然要依據這部新編成的最有權威性的皇家官藏這應該是大興善寺僧人慧琳來到西明寺的主要原因那麼慧琳音義是否完全依據圓照的貞元入藏録來編纂呢不是的這裡我將開元入藏録貞元入藏録慧琳音義的收經情況作一個對照對照時增收玄逸的開元釋教録廣品歷章以下簡稱廣品歷章玄逸宋高僧傳卷五有傳稱他是玄宗神武皇帝從外父沒有談及他的生活年代但房山石經本續開元録在著録廣品歷章時稱開元末京師華嚴寺沙門玄逸所撰可見他的相關活動時代在智升後圓照前他的廣品歷章依據開元入藏録編成可反映智升後圓照前我國大藏經的情況由於大藏經篇幅太大在此祗擬比較首部的大乘經般若部部分與尾部的賢聖傳記録此方撰述集傳部分為簡便起見經名均用簡稱並省略譯者名首先比較大乘經般若部部分表一開元入藏録廣品歷章貞元入藏録慧琳音義大般若經卷大般若經卷大般若經卷大般若經卷放光般若經卷放光般若經卷放光般若經卷放光般若經卷摩訶般若經卷摩訶般若經卷摩訶般若經卷摩訶般若經卷光讚般若經卷光讚般若經卷光讚般若經卷光讚般若經卷摩訶鈔經卷摩訶鈔經卷摩訶鈔經卷摩訶鈔經卷道行般若經卷道行般若經卷理趣般若經卷道行般若經卷小品般若經卷小品般若經卷大樂理趣經卷小品般若經卷大明度經卷大明度經卷道行般若經卷勝天王經卷勝天王經卷勝天王經卷小品般若經卷濡首分衛經卷文殊般若經卷文殊般若經卷大明度經卷大明度經卷文殊般若經卷文殊般若經卷勝天王經卷文殊般若經卷濡首分衛經卷濡首分衛經卷文殊般若經卷文殊般若經卷金剛經卷舍衛國金剛經卷舍衛國文殊般若經卷仁王般若經卷金剛經卷婆伽婆金剛經卷婆伽婆濡首分衛經卷新譯仁王經卷金剛經卷祇樹林金剛經卷祇樹林金剛經卷舍衛國仁王護國結壇經卷能斷金剛經卷室羅筏能斷金剛經卷室羅筏金剛經卷婆伽婆金剛經卷舍衛國能斷金剛經卷名稱城能斷金剛經卷名稱城金剛經卷祇樹林金剛經卷婆伽婆實相般若經卷仁王般若經卷能斷金剛經卷室羅筏金剛經卷祇樹林仁王般若經卷大明咒經卷能斷金剛經卷名稱城能斷金剛經卷室羅筏大明咒經卷般若心經卷實相般若經卷能斷金剛經卷名稱城般若心經卷實相般若經卷仁王般若經卷實相般若經卷新譯仁王經卷理趣般若經卷仁王陀羅尼釋卷大樂理趣經卷仁王念誦法卷大明咒經卷仁王念誦儀軌卷般若心經卷大明咒經卷新譯般若心經卷般若心經卷普遍智藏心經卷新譯般若心經卷修習般若菩薩觀行念誦儀軌卷大曼陀羅十七尊釋卷守護國界主陀羅尼經卷部卷部卷部卷部卷考察上表我們可以發現一廣品歷章完全依據開元入藏録組織但與開元入藏録相比它的收經部數雖然相同卷數卻少卷原因如下光讚般若開元入藏録為卷廣品歷章為卷少卷小品般若開元入藏録為卷廣品歷章為卷少卷以上兩項合計少卷此外實相般若經的排序在開元入藏録中為號而在廣品歷章中為號這說明即使像廣品歷章這樣公開表明完全依據開元入藏録來組織的藏經也不可能真正與開元入藏録完全相同追究其原因可以指出如下兩點第一當時的藏經都是寫本不同的寫本佛典經常因為紙張抄寫者等諸種原因出現同一部典籍的卷數多寡不一的現象所以在開元録廣品歷章貞元録等經録中經常需要注明某種經典共有幾種不同的卷本正在流傳第二當時千字文帙號還沒有出現更無所謂什麼帙內編碼由於缺乏帙號及帙內編碼的維繫諸經的次序很容易前後錯落二貞元入藏録以開元入藏録為基礎組織但增補部卷並將新增補的這些經典分作如下四個部分第一部分金剛頂瑜伽般若理趣經一卷般若理趣經釋一卷第二部分新譯仁王經二卷仁王般若陀羅尼釋一卷仁王般若念誦法經一卷仁王念誦儀軌一卷第三部分普遍智藏般若波羅蜜多心經一卷新譯般若波羅蜜多心經一卷第四部分修習般若波羅蜜菩薩觀行念誦儀軌一卷大曼陀羅十七尊釋一卷守護國界主陀羅尼經十卷上述前三個部分依照開元入藏録的原有結構插入般若部的相應經典之後第四個部分均為開元入藏録之大乘般若部原來沒有的經典故綴附在後面三現在來看慧琳音義慧琳音義編纂於貞元録之後編纂於西明寺按理說它應該與貞元入藏録基本一致但實際上它比貞元入藏録缺少了部卷即缺少第二部分仁王般若念誦法經一卷仁王念誦儀軌一卷第三部分普遍智藏般若波羅蜜多心經一卷第四部分修習般若波羅蜜菩薩觀行念誦儀軌一卷大曼陀羅十七尊釋一卷守護國界主陀羅尼經十卷以上共缺少部卷此外光讚般若貞元入藏録所收為卷慧琳音義卷首目録雖作卷實際所收卻為卷故少卷以上合計缺少部卷所以如將慧琳音義與開元入藏録相比雖然實際增加了