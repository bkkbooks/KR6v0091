的在此不再羅列需要指出的是其中釋迦氏略譜貞元入藏録作一卷慧琳音義作二卷別傳貞元入藏録作卷慧琳音義作卷上述情況說明在慧琳編纂一切經音義的時代對於佛教大藏經的基本結構形態人們比較認同智升開元入藏録的組織但對於大藏經到底應該收納哪些經典不同的人可以有自己不同的觀點雖然有開元入藏録這樣比較有影響的大藏經作榜樣乃至雖然有貞元入藏録這樣的皇家官藏為典範修造藏經的僧人依然可以按照自己的好惡對藏經內容自由取捨也就是說我國的佛教大藏經直到這個時候仍未能真正統一除了收經內容不同外從上表可以得知開元入藏録貞元入藏録慧琳音義諸經的排列次序與前述般若部一樣也是既有前後繼承的關係又互有較大的不同其基本原因上文已經敘述這裡僅就千字文帙號問題再略作說明千帙文帙號是我國僧人發明的藏經管理方式有類於現在圖書館所用的索書號千字文帙號的出現說明我國的佛藏管理已經達到很高的水平在敦煌遺書被發現以前人們僅知道千字文帙號最早出現在四卷本開元釋教録略出上而該略出又被署為由智升於開元十八年所撰所以人們均以為既然略出是智升所撰略出中的千字文帙號自然為智升所創進而推論從開元十八年起千字文帙號已經流傳實際上略出既非智升所撰千字文帙號也非智升所創這種帙號大約出現在會昌廢佛之後關於這個問題拙作八十世紀佛教大藏經史第四章已經作了詳盡的論述在此想利用貞元録的資料對此再做一點補充貞元録的結構基本上全部仿照開元録同樣既有一個有譯有本録第二十卷至第二十三卷又有一個入藏録第二十九第三十卷有譯有本録實際上與入藏録是重復的祗是一個為廣録一個是略出而已下面將上述兩録此方撰述部諸經的排列次序略作比較為簡略起見僅比較前部表三貞元有譯有本録貞元入藏録大佛名經卷大佛名經卷上一部二帙上一部二帙釋迦譜卷釋迦譜卷釋迦氏略譜卷釋迦氏略譜卷釋迦方志卷釋迦方志卷上三部二帙上三部二帙經律異相卷經律異相卷上一部五帙上一部五帙陀羅尼雜集卷陀羅尼雜集卷上一部一帙上一部一帙諸經要集卷諸經要集卷上一部三帙上一部三帙出三藏記集卷出三藏記集卷衆經目録卷衆經目録卷上二部二帙上二部二帙開皇三寶録卷大唐內典録卷衆經目録卷上一部一帙上二部二帙續大唐內典録卷大唐內典録卷古今譯經圖紀卷上一部一帙續古今譯經圖紀卷續大唐內典録卷大周刊定衆經目録卷古今譯經圖紀卷上四部二帙續古今譯經圖紀卷開皇三寶録卷大周刊定衆經目録卷衆經目録卷上四部二帙上二部二帙開元釋教録卷開元釋教録卷上一部二帙上一部二帙上述部經典內容一樣卷數一樣合帙方式一樣但是在有譯有本録中開皇三寶録與衆經目録等二部所合成的兩帙排在大唐內典録之前而在入藏録中這兩帙卻被排在大周録之後同樣是圓照自己編定的藏經為什麼會發生這樣的次序變化邏輯的答案祗有一個就是當時千字文祑號還沒有産生使用的還是經名祑號法與定格儲藏法所以産生這種經典次序前後錯落的情況通過上面的討論我們可以得出如下結論一以往人們對慧琳音義的研究往往集中在諸如佛教義學文字學音韻學輯佚考史等諸多方面但是由於該音義是慧琳依據西明寺所存的一部現前藏經增補刪節後編寫而成所以它也可以成為我們研究當時大藏經的重要資料二從慧琳音義與開元入藏録廣品歷章貞元入藏録等的比較可以看出雖然開元入藏録在當時已經有著較大的影響但各地的藏經並沒有完全依據開元入藏録進行組織而是依照各地的不同條件乃至編藏者個人的好惡對藏經內容自作變動也就是說藏經的結構雖然有所趨同藏經的內容依然百花齊放全國藏經的真正統一是會昌廢佛以後的事情這也是拙作八十世紀佛教大藏經史修訂本即出將會昌廢佛作為分期標志區分寫本藏經的結構體系化階段與全國統一化階段的原因就慧琳音義與唐代大藏經這個題目而言可以研究的問題還很多比如對慧琳音義新增補的經典應該逐一考證乃至索隱鉤沉這可以為我們研究當時的佛教提供許多新的寶貴的資料比如對慧琳音義涉及到一批經序也值得一一加以考證查核經序在佛教文獻研究藏經研究中具有重要地位遺憾的是至今人們對此還缺乏必要的重視與充分的利用還有應該將慧琳音義與可洪音義做一個比較詳細的對照這對我們論證會昌廢佛以後佛教大藏經最終如何統一到開元入藏録的形態上可以提供強有力的證據但限於篇幅這些工作祗有留待將來去進行了年月日
